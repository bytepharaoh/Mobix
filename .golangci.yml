version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - misspell

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/bytepharaoh/Mobix

issues:
  max-issues-per-linter: 50
  max-same-issues: 10