version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq

    ports:
      - "5672:5672" # Messaging port
      - "15672:15672" # RabbitMQ admin dashboard port

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}


  # MongoDB without healthckeck, because they are noisy in logs
  mongodb:
    image: mongo:8
    container_name: mongodb

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}

    ports:
      - "27017:27017"

    #volumes:
      #- ./mongo/init.js:/docker-entrypoint-initdb.d/init.js


  # OpenTelemetry - framework for tracing backend requests though different services
  # and store statistics about it
  # Jaeger - tool for visualizing OpenTelemetry statistics
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger

    ports:
      - "16686:16686" # Jaeger Web UI
      - "4317:4317" # OpenTelemetry gRPC endpoint
      - "4318:4318" # OpenTelemetry HTTP endpoint

    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # Container for node.js used for migration library migrate-mongo
  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrations

    working_dir: /app

    # This command maps local directory to a docker one,
    # so migration file added inside docker will appear in our project as well
    volumes:
    - ./db/migrations:/app/db/migrations

    env_file:
    - .env

    depends_on:
      - mongodb
